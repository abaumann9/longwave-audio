<svg width="100%" viewBox="0 0 680 350" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="wave-grad" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#085041"/>
<stop offset="40%" stop-color="#1D9E75"/>
<stop offset="100%" stop-color="#5DCAA5"/>
</linearGradient>
</defs>

<rect x="0" y="0" width="680" height="340" rx="0" fill="#0A0E14" style="fill:rgb(10, 14, 20);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Background glow -->
<ellipse cx="340" cy="170" rx="300" ry="120" fill="#1D9E75" opacity="0.04" style="fill:rgb(29, 158, 117);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.04;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Main waveform - long wavelength sine wave -->
<path d="M0 170 Q85 100, 170 170 Q255 240, 340 170 Q425 100, 510 170 Q595 240, 680 170" fill="none" stroke="url(#wave-grad)" stroke-width="3" stroke-linecap="round" style="fill:none;color:rgb(0, 0, 0);stroke-width:3px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Second harmonic - thinner, offset -->
<path d="M0 170 Q42 145, 85 170 Q127 195, 170 170 Q212 145, 255 170 Q297 195, 340 170 Q382 145, 425 170 Q467 195, 510 170 Q552 145, 595 170 Q637 195, 680 170" fill="none" stroke="#5DCAA5" stroke-width="1" opacity="0.3" stroke-linecap="round" style="fill:none;stroke:rgb(93, 202, 165);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.3;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Sound wave emanation (right side) -->
<path d="M560 170 Q575 140, 575 170 Q575 200, 560 170" fill="none" stroke="#5DCAA5" stroke-width="1.5" opacity="0.5" style="fill:none;stroke:rgb(93, 202, 165);color:rgb(0, 0, 0);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<path d="M575 170 Q595 130, 595 170 Q595 210, 575 170" fill="none" stroke="#5DCAA5" stroke-width="1.2" opacity="0.35" style="fill:none;stroke:rgb(93, 202, 165);color:rgb(0, 0, 0);stroke-width:1.2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.35;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<path d="M590 170 Q615 120, 615 170 Q615 220, 590 170" fill="none" stroke="#5DCAA5" stroke-width="1" opacity="0.2" style="fill:none;stroke:rgb(93, 202, 165);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.2;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Wi-Fi HaLow signal arcs (left side) -->
<path d="M120 170 Q105 200, 105 170 Q105 140, 120 170" fill="none" stroke="#1D9E75" stroke-width="1.5" opacity="0.5" style="fill:none;stroke:rgb(29, 158, 117);color:rgb(0, 0, 0);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<path d="M105 170 Q85 210, 85 170 Q85 130, 105 170" fill="none" stroke="#1D9E75" stroke-width="1.2" opacity="0.35" style="fill:none;stroke:rgb(29, 158, 117);color:rgb(0, 0, 0);stroke-width:1.2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.35;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<path d="M90 170 Q65 220, 65 170 Q65 120, 90 170" fill="none" stroke="#1D9E75" stroke-width="1" opacity="0.2" style="fill:none;stroke:rgb(29, 158, 117);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.2;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Project name -->
<text x="340" y="120" text-anchor="middle" font-family="var(--font-sans)" font-size="36" font-weight="500" fill="#E1F5EE" letter-spacing="2" style="fill:rgb(225, 245, 238);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:36px;font-weight:500;text-anchor:middle;dominant-baseline:auto">LongWave Audio</text>

<!-- Tagline -->
<text x="340" y="230" text-anchor="middle" font-family="var(--font-sans)" font-size="13" fill="#9FE1CB" letter-spacing="1" style="fill:rgb(159, 225, 203);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:13px;font-weight:400;text-anchor:middle;dominant-baseline:auto">open source multi-room audio over Wi-Fi HaLow</text>

<!-- Small dots along the wave for visual interest -->
<circle cx="170" cy="170" r="3" fill="#1D9E75" opacity="0.8" style="fill:rgb(29, 158, 117);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.8;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<circle cx="340" cy="170" r="3" fill="#5DCAA5" opacity="0.8" style="fill:rgb(93, 202, 165);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.8;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<circle cx="510" cy="170" r="3" fill="#1D9E75" opacity="0.8" style="fill:rgb(29, 158, 117);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.8;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
</svg>